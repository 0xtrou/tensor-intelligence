name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: bittensor_intel_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" aiosqlite
          pip install pytest pytest-asyncio pytest-cov httpx
          pip install coverage-badge setuptools

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/bittensor_intel_test
        run: pytest tests/ -v --cov=src --cov-report=term-missing --cov-report=json:coverage-backend.json

      - name: Generate coverage badge
        run: |
          pip install setuptools
          coverage-badge -o badges/backend.svg -f coverage-backend.json

      - name: Upload coverage badge
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge-backend
          path: badges/backend.svg

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Type check
        working-directory: frontend
        run: npx tsc -b --noEmit

      - name: Run tests with coverage summary
        working-directory: frontend
        run: npx vitest run --coverage --coverage.reporter=json --coverage.reporter=json-summary

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary-frontend
          path: frontend/coverage/coverage-summary.json

      - name: Build
        working-directory: frontend
        run: npm run build

  badges:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          name: coverage-badge-backend
          path: badges

      - uses: actions/download-artifact@v4
        with:
          name: coverage-summary-frontend
          path: coverage

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate frontend coverage badge
        run: |
          pip install coverage-badge setuptools
          TOTAL=$(python3 -c "import json; d=json.load(open('coverage/coverage-summary.json')); print(d['total']['lines']['pct'])")
          COVERAGE_INT=$(python3 -c "print(int(float('$TOTAL')))")
          coverage-badge -o badges/frontend.svg "$COVERAGE_INT"

      - name: Commit coverage badges
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badges/
          git commit -m "chore: update coverage badges [skip ci]" || true
          git push
