version: '3.8'

services:
  api:
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/bittensor_intel
      - REDIS_URL=redis://redis:6379/0
      - LLM_BASE_URL=http://localhost:4000/v1
    depends_on:
      - db
      - redis
    volumes:
      - ./logs:/app/logs
    networks:
      - bittensor-net

  worker:
    build: .
    command: python -m src.engine.scheduler
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/bittensor_intel
      - REDIS_URL=redis://redis:6379/0
      - LLM_BASE_URL=http://localhost:4000/v1
      - POLL_INTERVAL_MINUTES=15
    depends_on:
      - db
      - redis
    volumes:
      - ./logs:/app/logs
    networks:
      - bittensor-net

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=bittensor_intel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bittensor-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - bittensor-net

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - bittensor-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - bittensor-net

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  bittensor-net:
    driver: bridge
